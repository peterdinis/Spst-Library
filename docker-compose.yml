version: '3.8'

services:
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - spsif-library-network
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 3

  author-service:
    build:
      context: .
      dockerfile: Dockerfile.optimized
      args:
        SERVICE_NAME: AuthorService
    container_name: author-service
    ports:
      - "5001:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - RABBITMQ__HOST=rabbitmq
      - RABBITMQ__PORT=5672
      - RABBITMQ__USERNAME=guest
      - RABBITMQ__PASSWORD=guest
      - DOTNET_READYTORUN=1
      - DOTNET_TieredCompilation=1
      - DOTNET_TieredPGO=1
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - spsif-library-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s

  category-service:
    build:
      context: .
      dockerfile: Dockerfile.optimized
      args:
        SERVICE_NAME: CategoryService
    container_name: category-service
    ports:
      - "5002:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - RABBITMQ__HOST=rabbitmq
      - RABBITMQ__PORT=5672
      - RABBITMQ__USERNAME=guest
      - RABBITMQ__PASSWORD=guest
      - DOTNET_READYTORUN=1
      - DOTNET_TieredCompilation=1
      - DOTNET_TieredPGO=1
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - spsif-library-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s

  books-service:
    build:
      context: .
      dockerfile: Dockerfile.optimized
      args:
        SERVICE_NAME: BooksService
    container_name: books-service
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - RABBITMQ__HOST=rabbitmq
      - RABBITMQ__PORT=5672
      - RABBITMQ__USERNAME=guest
      - RABBITMQ__PASSWORD=guest
      - DOTNET_READYTORUN=1
      - DOTNET_TieredCompilation=1
      - DOTNET_TieredPGO=1
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - spsif-library-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s

  gateway-service:
    build:
      context: .
      dockerfile: Dockerfile.optimized
      args:
        SERVICE_NAME: GatewayService
    container_name: gateway-service
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ClientApp=http://localhost:3000
      - DOTNET_READYTORUN=1
      - DOTNET_TieredCompilation=1
      - DOTNET_TieredPGO=1
    depends_on:
      author-service:
        condition: service_healthy
      category-service:
        condition: service_healthy
      books-service:
        condition: service_healthy
    networks:
      - spsif-library-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  rabbitmq_data:

networks:
  spsif-library-network:
    driver: bridge