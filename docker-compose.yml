version: '3.8'

services:
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - spsif-library-network
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 30s
      timeout: 10s
      retries: 5

  author-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: AuthorService
    container_name: author-service
    ports:
      - "5001:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - RABBITMQ__HOST=rabbitmq
      - RABBITMQ__PORT=5672
      - RABBITMQ__USERNAME=guest
      - RABBITMQ__PASSWORD=guest
      - DOTNET_READYTORUN=1
      - DOTNET_TieredCompilation=1
      - DOTNET_TieredPGO=1
    networks:
      - spsif-library-network
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: on-failure

  category-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: CategoryService
    container_name: category-service
    ports:
      - "5002:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - RABBITMQ__HOST=rabbitmq
      - RABBITMQ__PORT=5672
      - RABBITMQ__USERNAME=guest
      - RABBITMQ__PASSWORD=guest
      - DOTNET_READYTORUN=1
      - DOTNET_TieredCompilation=1
      - DOTNET_TieredPGO=1
    networks:
      - spsif-library-network
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: on-failure

  books-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: BooksService
    container_name: books-service
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - RABBITMQ__HOST=rabbitmq
      - RABBITMQ__PORT=5672
      - RABBITMQ__USERNAME=guest
      - RABBITMQ__PASSWORD=guest
      - DOTNET_READYTORUN=1
      - DOTNET_TieredCompilation=1
      - DOTNET_TieredPGO=1
    networks:
      - spsif-library-network
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: on-failure

  order-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: OrderService
    container_name: order-service
    ports:
      - "5003:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - RABBITMQ__HOST=rabbitmq
      - RABBITMQ__PORT=5672
      - RABBITMQ__USERNAME=guest
      - RABBITMQ__PASSWORD=guest
      - BooksService__Url=http://books-service:8080
      - DOTNET_READYTORUN=1
      - DOTNET_TieredCompilation=1
      - DOTNET_TieredPGO=1
    depends_on:
      rabbitmq:
        condition: service_healthy
      books-service:
        condition: service_started
    networks:
      - spsif-library-network

  identity-service:
  admin-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: IdentityService
    container_name: identity-service
        SERVICE_NAME: AdminService
    container_name: admin-service
    ports:
      - "5004:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - RABBITMQ__HOST=rabbitmq
      - RABBITMQ__PORT=5672
      - RABBITMQ__USERNAME=guest
      - RABBITMQ__PASSWORD=guest
      - DOTNET_READYTORUN=1
      - DOTNET_TieredCompilation=1
      - DOTNET_TieredPGO=1
    networks:
      - spsif-library-network
    restart: on-failure

  notifications-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: NotificationsService
    container_name: notifications-service
    ports:
      - "5005:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - RABBITMQ__HOST=rabbitmq
      - RABBITMQ__PORT=5672
      - RABBITMQ__USERNAME=guest
      - RABBITMQ__PASSWORD=guest
      - Services__Authors=http://authors-service:8080
      - Services__Categories=http://categories-service:8080
      - Services__Books=http://books-service:8080
      - Services__Orders=http://order-service:8080
      - DOTNET_READYTORUN=1
      - DOTNET_TieredCompilation=1
      - DOTNET_TieredPGO=1
    depends_on:
      - rabbitmq
      rabbitmq:
        condition: service_healthy
      authors-service:
        condition: service_started
      categories-service:
        condition: service_started
      books-service:
        condition: service_started
      order-service:
        condition: service_started
    networks:
      - spsif-library-network
    restart: on-failure

  gateway-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: GatewayService
    container_name: gateway-service
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ClientApp=http://localhost:3000
      - Services__Authors=http://authors-service:8080
      - Services__Categories=http://categories-service:8080
      - Services__Books=http://books-service:8080
      - Services__Orders=http://order-service:8080
      - Services__Admin=http://admin-service:8080
      - DOTNET_READYTORUN=1
      - DOTNET_TieredCompilation=1
      - DOTNET_TieredPGO=1
    depends_on:
      - authors-service
      - categories-service
      - books-service
      - order-service
      - identity-service
      - notifications-service
      - admin-service
    networks:
      - spsif-library-network
    restart: on-failure

volumes:
  rabbitmq_data:

networks:
  spsif-library-network:
    driver: bridge