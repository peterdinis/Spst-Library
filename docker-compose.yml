services:
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - spsif-library-network
    # Odstránený healthcheck - kontajner sa považuje za spustený okamžite

  # Identity Service musí bežať ako prvé, pretože ostatné služby ho môžu potrebovať
  identity-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: IdentityService
    container_name: identity-service
    ports:
      - "5055:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - RABBITMQ__HOST=rabbitmq
      - RABBITMQ__PORT=5672
      - RABBITMQ__USERNAME=guest
      - RABBITMQ__PASSWORD=guest
      - DOTNET_READYTORUN=1
      - DOTNET_TieredCompilation=1
      - DOTNET_TieredPGO=1
      - ConnectionStrings__DefaultConnection=Data Source=identity.db
    networks:
      - spsif-library-network
    depends_on:
      - rabbitmq  # Zmenené z condition: service_healthy na jednoduché depends_on
    restart: on-failure
    volumes:
      - identity_data:/app/data

  author-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: AuthorService
    container_name: author-service
    ports:
      - "5008:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - RABBITMQ__HOST=rabbitmq
      - RABBITMQ__PORT=5672
      - RABBITMQ__USERNAME=guest
      - RABBITMQ__PASSWORD=guest
      - DOTNET_READYTORUN=1
      - DOTNET_TieredCompilation=1
      - DOTNET_TieredPGO=1
      - IdentityService__BaseUrl=http://identity-service:8080
      - BooksService__BaseUrl=http://books-service:8080
      - CategoryService__BaseUrl=http://category-service:8080
    networks:
      - spsif-library-network
    depends_on:
      - rabbitmq
      - identity-service
    restart: on-failure

  category-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: CategoryService
    container_name: category-service
    ports:
      - "5138:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - RABBITMQ__HOST=rabbitmq
      - RABBITMQ__PORT=5672
      - RABBITMQ__USERNAME=guest
      - RABBITMQ__PASSWORD=guest
      - DOTNET_READYTORUN=1
      - DOTNET_TieredCompilation=1
      - DOTNET_TieredPGO=1
      - IdentityService__BaseUrl=http://identity-service:8080
      - BooksService__BaseUrl=http://books-service:8080
    networks:
      - spsif-library-network
    depends_on:
      - rabbitmq
      - identity-service
    restart: on-failure

  books-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: BooksService
    container_name: books-service
    ports:
      - "5050:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - RABBITMQ__HOST=rabbitmq
      - RABBITMQ__PORT=5672
      - RABBITMQ__USERNAME=guest
      - RABBITMQ__PASSWORD=guest
      - DOTNET_READYTORUN=1
      - DOTNET_TieredCompilation=1
      - DOTNET_TieredPGO=1
      - IdentityService__BaseUrl=http://identity-service:8080
      - AuthorService__BaseUrl=http://author-service:8080
      - CategoryService__BaseUrl=http://category-service:8080
      - OrderService__BaseUrl=http://order-service:8080
    networks:
      - spsif-library-network
    depends_on:
      - rabbitmq
      - identity-service
    restart: on-failure

  order-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: OrderService
    container_name: order-service
    ports:
      - "5051:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - RABBITMQ__HOST=rabbitmq
      - RABBITMQ__PORT=5672
      - RABBITMQ__USERNAME=guest
      - RABBITMQ__PASSWORD=guest
      - IdentityService__BaseUrl=http://identity-service:8080
      - BooksService__BaseUrl=http://books-service:8080
      - BooksService__Url=http://books-service:8080/api/books
      - BooksService__InternalUrl=http://books-service:8080
      - DOTNET_READYTORUN=1
      - DOTNET_TieredCompilation=1
      - DOTNET_TieredPGO=1
    depends_on:
      - rabbitmq
      - identity-service
      - books-service
    networks:
      - spsif-library-network
    restart: on-failure

  admin-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: AdminService
    container_name: admin-service
    ports:
      - "5231:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - RABBITMQ__HOST=rabbitmq
      - RABBITMQ__PORT=5672
      - RABBITMQ__USERNAME=guest
      - RABBITMQ__PASSWORD=guest
      - DOTNET_READYTORUN=1
      - DOTNET_TieredCompilation=1
      - DOTNET_TieredPGO=1
      - IdentityService__BaseUrl=http://identity-service:8080
      - BooksService__BaseUrl=http://books-service:8080
      - AuthorService__BaseUrl=http://author-service:8080
      - CategoryService__BaseUrl=http://category-service:8080
      - OrderService__BaseUrl=http://order-service:8080
    networks:
      - spsif-library-network
    depends_on:
      - rabbitmq
      - identity-service
    restart: on-failure

volumes:
  rabbitmq_data:
  identity_data:

networks:
  spsif-library-network:
    driver: bridge