version: '3.8'

services:
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - spsif-library-network
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 3

  authors-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: AuthorService
    container_name: authors-service
    ports:
      - "5001:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - RABBITMQ__HOST=rabbitmq
      - RABBITMQ__PORT=5672
      - RABBITMQ__USERNAME=guest
      - RABBITMQ__PASSWORD=guest
      - DOTNET_READYTORUN=1
      - DOTNET_TieredCompilation=1
      - DOTNET_TieredPGO=1
    depends_on:
      - rabbitmq
    networks:
      - spsif-library-network

  categories-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: CategoryService
    container_name: categories-service
    ports:
      - "5002:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - RABBITMQ__HOST=rabbitmq
      - RABBITMQ__PORT=5672
      - RABBITMQ__USERNAME=guest
      - RABBITMQ__PASSWORD=guest
      - DOTNET_READYTORUN=1
      - DOTNET_TieredCompilation=1
      - DOTNET_TieredPGO=1
    depends_on:
      - rabbitmq
    networks:
      - spsif-library-network

  books-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: BooksService
    container_name: books-service
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - RABBITMQ__HOST=rabbitmq
      - RABBITMQ__PORT=5672
      - RABBITMQ__USERNAME=guest
      - RABBITMQ__PASSWORD=guest
      - DOTNET_READYTORUN=1
      - DOTNET_TieredCompilation=1
      - DOTNET_TieredPGO=1
    depends_on:
      - rabbitmq
    networks:
      - spsif-library-network

  gateway-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: GatewayService
    container_name: gateway-service
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - DOTNET_READYTORUN=1
      - DOTNET_TieredCompilation=1
      - DOTNET_TieredPGO=1
    depends_on:
      - authors-service
      - categories-service
      - books-service
    networks:
      - spsif-library-network

volumes:
  rabbitmq_data:


networks:
  spsif-library-network:
    driver: bridge
