version: '3.8'

services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"   # AMQP protocol
      - "15672:15672" # Management UI
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - spsif-library-network
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 30s
      timeout: 10s
      retries: 5

  search-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: SearchService
    ports:
      - "5008:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - RABBITMQ__HOST=rabbitmq
      - RABBITMQ__PORT=5672
      - RABBITMQ__USERNAME=guest
      - RABBITMQ__PASSWORD=guest
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - spsif-library-network

  author-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: AuthorService
    ports:
      - "5001:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - RABBITMQ__HOST=rabbitmq
      - RABBITMQ__PORT=5672
      - RABBITMQ__USERNAME=guest
      - RABBITMQ__PASSWORD=guest
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - spsif-library-network

  category-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: CategoryService
    ports:
      - "5002:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - RABBITMQ__HOST=rabbitmq
      - RABBITMQ__PORT=5672
      - RABBITMQ__USERNAME=guest
      - RABBITMQ__PASSWORD=guest
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - spsif-library-network

  publisher-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: PublisherService
    ports:
      - "5003:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - RABBITMQ__HOST=rabbitmq
      - RABBITMQ__PORT=5672
      - RABBITMQ__USERNAME=guest
      - RABBITMQ__PASSWORD=guest
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - spsif-library-network

  book-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: BookService
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - RABBITMQ__HOST=rabbitmq
      - RABBITMQ__PORT=5672
      - RABBITMQ__USERNAME=guest
      - RABBITMQ__PASSWORD=guest
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - spsif-library-network

  gateway-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: GatewayService
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      - search-service
      - author-service
      - category-service
      - publisher-service
      - book-service
      - rabbitmq:
          condition: service_healthy
    networks:
      - spsif-library-network

volumes:
  rabbitmq_data:

networks:
  spsif-library-network:
    driver: bridge